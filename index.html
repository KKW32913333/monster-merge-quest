<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ Monster Merge Quest</title>

  <!-- 保存済みテーマを即時反映（画面のちらつき防止） -->
  <script>
    (function () {
      var saved = localStorage.getItem('monsterMergeTheme') || 'dungeon';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>

  <!-- PWA 設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4a012">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MonsterMerge">

  <!-- アイコン (iOS Safari 向け・全サイズ) -->
  <link rel="apple-touch-icon" sizes="58x58"   href="icon-58.png">
  <link rel="apple-touch-icon" sizes="80x80"   href="icon-80.png">
  <link rel="apple-touch-icon" sizes="87x87"   href="icon-87.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="apple-touch-icon"                 href="icon-180.png">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="firebase.js"></script>

  <!-- Service Worker 登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('✅ Service Worker 登録完了'))
          .catch(err => console.warn('Service Worker 登録失敗:', err));
      });
      // 新しいService Workerが有効化されたら自動でリロードして最新版を反映
      let hasReloaded = false;
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'SW_UPDATED' && !hasReloaded) {
          hasReloaded = true;
          window.location.reload();
        }
      });
    }
  </script>
</head>
<body>
  <!-- 松明エフェクト -->
  <div class="torch torch-left">🔥</div>
  <div class="torch torch-right">🔥</div>

  <div id="app">
    <header id="game-header">
      <div id="header-top-row">
        <button id="home-btn" title="タイトルに戻る">🏠</button>
        <h1 id="game-title">⚔️ MONSTER MERGE</h1>
        <button id="shop-btn" title="ショップ（ゴールドを使う）">🛒</button>
        <button id="restart-btn" title="最初からやり直す">↺</button>
      </div>
      <div id="header-bottom-row">
        <div id="score-panel">
          <div class="score-block">
            <span class="score-label">💰 GOLD</span>
            <span id="score-display">0</span>
          </div>
          <div class="score-block">
            <span class="score-label">👑 BEST</span>
            <span id="best-display">0</span>
          </div>
          <div class="score-block chain-block">
            <span class="score-label">⚔️ COMBO</span>
            <span id="chain-display">x1</span>
          </div>
        </div>
        <div id="preview-panel-group">
          <div id="next-panel">
            <span class="score-label">NEXT</span>
            <canvas id="next-canvas" width="60" height="60"></canvas>
          </div>
          <div id="hold-panel" title="ホールド（現在のモンスターをキープ）">
            <span class="score-label">HOLD</span>
            <canvas id="hold-canvas" width="60" height="60"></canvas>
          </div>
        </div>
      </div>
    </header>

    <div id="game-container">
      <div id="danger-line"></div>
      <!-- ダンジョン装飾 -->
      <div class="dungeon-left"></div>
      <div class="dungeon-right"></div>
      <canvas id="game-canvas"></canvas>
      <canvas id="effect-canvas"></canvas>
    </div>

    <div id="evolution-bar">
      <div class="evo-label">進化 →</div>
      <div id="evo-list"></div>
    </div>

    <!-- タイトル画面 -->
    <div id="title-screen" class="hidden">
      <div id="title-box">
        <div id="title-logo"><img src="icon-180.png" alt="Monster Merge Quest"></div>
        <div id="title-name">MONSTER<br>MERGE QUEST</div>
        <div id="title-sub">モンスター合体パズル冒険！</div>

        <div id="mission-panel">
          <div id="mission-header">📋 本日のミッション</div>
          <div id="mission-desc">-</div>
          <div id="mission-bar"><div id="mission-bar-fill"></div></div>
          <div id="mission-status">0/0</div>
        </div>

        <button id="start-btn">⚔️ 冒険を始める！</button>
        <button id="title-ranking-btn">🏆 殿堂ランキング</button>
        <button id="difficulty-btn">🎚️ 難易度: <span id="difficulty-label">中級</span></button>
        <button id="theme-btn">🎨 テーマを選ぶ</button>
      </div>
    </div>

    <!-- ゲームオーバー -->
    <div id="gameover-screen" class="hidden">
      <div id="gameover-box">
        <div id="gameover-title">💀 DEFEATED</div>
        <div id="final-score-label">GOLD EARNED</div>
        <div id="final-score">0</div>
        <div id="gameover-name-section">
          <input id="player-name" type="text" placeholder="冒険者の名前..." maxlength="12">
          <button id="submit-score-btn">殿堂入り</button>
        </div>
        <button id="retry-btn">⚔️ 再挑戦</button>
        <button id="ranking-btn">🏆 殿堂を見る</button>
        <button id="title-btn">🏰 タイトルに戻る</button>
      </div>
    </div>

    <!-- ランキング -->
    <div id="ranking-screen" class="hidden">
      <div id="ranking-box">
        <div id="ranking-title">🏆 冒険者殿堂</div>
        <div id="ranking-list"></div>
        <button id="close-ranking-btn">🏰 タイトルに戻る</button>
      </div>
    </div>

    <!-- テーマ選択 -->
    <div id="theme-screen" class="hidden">
      <div id="theme-box">
        <div id="theme-title">🎨 テーマを選ぶ</div>
        <div id="theme-list">
          <button class="theme-option" data-theme-id="dungeon">
            <span class="theme-swatch sw-dungeon"></span>
            <span class="theme-option-name">漆黒の地下大迷宮</span>
          </button>
          <button class="theme-option" data-theme-id="volcanic">
            <span class="theme-swatch sw-volcanic"></span>
            <span class="theme-option-name">業火の火山地帯</span>
          </button>
          <button class="theme-option" data-theme-id="ice">
            <span class="theme-swatch sw-ice"></span>
            <span class="theme-option-name">氷結の永久凍土</span>
          </button>
          <button class="theme-option" data-theme-id="cosmic">
            <span class="theme-swatch sw-cosmic"></span>
            <span class="theme-option-name">星霜の魔法陣</span>
          </button>
          <button class="theme-option" data-theme-id="meadow">
            <span class="theme-swatch sw-meadow"></span>
            <span class="theme-option-name">黄金の草原</span>
          </button>
          <button class="theme-option" data-theme-id="sakura">
            <span class="theme-swatch sw-sakura"></span>
            <span class="theme-option-name">桜霞の郷</span>
          </button>
        </div>
        <button id="theme-close-btn">閉じる</button>
      </div>
    </div>

    <!-- 難易度選択 -->
    <div id="difficulty-screen" class="hidden">
      <div id="difficulty-box">
        <div id="difficulty-title">🎚️ 難易度を選ぶ</div>
        <div id="difficulty-list">
          <button class="difficulty-option" data-difficulty-id="easy">
            <span>初級</span>
            <span class="difficulty-option-desc">ゆっくり落下・出現モンスターも控えめ</span>
          </button>
          <button class="difficulty-option" data-difficulty-id="normal">
            <span>中級</span>
            <span class="difficulty-option-desc">標準的な速度とバランス</span>
          </button>
          <button class="difficulty-option" data-difficulty-id="hard">
            <span>上級</span>
            <span class="difficulty-option-desc">落下が速く、強いモンスターも出現。高スコア倍率</span>
          </button>
        </div>
        <button id="difficulty-close-btn">閉じる</button>
      </div>
    </div>

    <!-- ショップ -->
    <div id="shop-screen" class="hidden">
      <div id="shop-box">
        <div id="shop-title">🛒 ショップ</div>
        <div id="shop-gold-row">
          <span class="score-label">所持ゴールド</span>
          <span id="shop-gold">0</span>
        </div>
        <div id="shop-list"></div>
        <button id="shop-close-btn">閉じる</button>
      </div>
    </div>
  </div>

  <script src="game.js" defer></script>
</body>
</html>
